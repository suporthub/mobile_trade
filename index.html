<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Live Fx Hub - Professional Trading Platform">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Live Fx Hub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <title>Live Fx Hub</title>
  <link rel="manifest" href="manifest.json">

  <!-- Stripe.js for payment processing -->
  <script src="https://js.stripe.com/v3/"></script>

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>

<body>
  <!-- Loading screen — matches native splash design -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="logo-text">
        <span class="logo-live">Live </span><span class="logo-fx">Fx </span><span class="logo-hub">Hub</span>
      </div>
      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.4s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1.2px;
    }

    .logo-live,
    .logo-hub {
      color: #000000;
    }

    .logo-fx {
      color: #58a6ff;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #58a6ff;
      animation: dot-bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .dot:nth-child(2) {
      animation-delay: 0.16s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.32s;
    }

    @keyframes dot-bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>

  <script src="flutter_bootstrap.js" async=""></script>
  <script>
    // Remove loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 500);
      }
    });
  </script>
</body>

</html>
